<!DOCTYPE html><html><head><style>body{width:280px;font-family:monospace;background:#0d0d0d;color:#00ffcc;margin:0;padding:15px;}h3{color:#ff0055;margin-top:0;border-bottom:1px solid #333;padding-bottom:5px;font-size:14px;letter-spacing:1px;}div{margin:10px 0;font-size:12px;}.count{font-weight:bold;color:#fff;float:right;}</style></head><body><h3>[aiOut Telemetry]</h3><div>Fingerprint Blocks: <span class="count" id="fingerprints">0</span></div><div>Spoofed Cookies: <span class="count" id="cookies">0</span></div><script>chrome.tabs.query({active:true,currentWindow:true},(tabs)=>{if(!tabs[0])return;const url=new URL(tabs[0].url);const domain=url.hostname;const key="vig_"+domain;chrome.storage.local.get([key],(res)=>{if(res[key]){document.getElementById("fingerprints").innerText=res[key].count||0;document.getElementById("cookies").innerText=res[key].cookies||0;}});});</script></body></html>
