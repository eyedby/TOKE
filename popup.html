<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      background-color: #0a0a0a;
      color: #c8c8c8;
      font-family: monospace;
      margin: 0;
      padding: 14px 16px 16px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #222;
    }
    .header-name {
      color: #e8ff00;
      font-weight: bold;
      font-size: 18px;
      letter-spacing: 2px;
    }
    .header-sub {
      font-size: 10px;
      color: #444;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Toggle ── */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 9px 12px;
      margin-bottom: 14px;
    }
    .toggle-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #666;
    }
    .toggle-status {
      font-size: 10px;
      letter-spacing: 1px;
      margin-top: 3px;
    }
    .toggle-status.on  { color: #39ff6e; }
    .toggle-status.off { color: #ff2244; }
    .switch {
      position: relative;
      width: 42px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .slider:before {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 2px; top: 2px;
      background: #444;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: #0d2b16; border-color: #39ff6e44; }
    input:checked + .slider:before { transform: translateX(20px); background: #39ff6e; }

    /* ── Telemetry meters ── */
    .section-label {
      font-size: 10px;
      color: #3a3a3a;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .meter-container { margin-bottom: 14px; }
    .meter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .meter-row:last-child { border-bottom: none; }
    .label { color: #555; font-size: 12px; }
    .value { color: #39ff6e; font-weight: bold; font-size: 13px; }

    /* ── Buttons ── */
    .btn {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 10px;
      font-weight: bold;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 8px;
      font-family: monospace;
      font-size: 12px;
      width: 100%;
      cursor: pointer;
      border: none;
    }
    .toke-btn {
      background: #e8ff00;
      color: #0a0a0a;
    }
    .toke-btn:hover { background: #f5ff4d; }
    .amok-btn {
      background: transparent;
      color: #e8ff00;
      border: 1px solid #e8ff0044;
    }
    .amok-btn:hover { border-color: #e8ff00aa; background: #e8ff0008; }
    .wallet-btn {
      background: #111;
      color: #888;
      border: 1px solid #222;
    }
    .wallet-btn:hover { border-color: #444; color: #aaa; }

    /* ── Disabled state ── */
    body.disabled .meter-container,
    body.disabled .toke-btn,
    body.disabled .amok-btn,
    body.disabled .wallet-btn {
      opacity: 0.25;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-name">TOKE</span>
    <span class="header-sub">aiOut telemetry</span>
  </div>

  <!-- Toggle -->
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Extension</div>
      <div class="toggle-status off" id="toggle-status">DISABLED</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="ext-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Telemetry -->
  <div class="section-label">Signal</div>
  <div class="meter-container">
    <div class="meter-row">
      <span class="label">Fingerprint Blocks</span>
      <span class="value" id="trap-count">0</span>
    </div>
    <div class="meter-row">
      <span class="label">Spoofed Cookies</span>
      <span class="value" id="cookie-count">0</span>
    </div>
  </div>

  <!-- TOKE: Political Currency -->
  <a href="https://keepaion.com/issues.html" target="_blank" class="btn toke-btn">
    ⚡ Political Currency — TOKE
  </a>

  <!-- AMOK: Opt-out / Verify -->
  <button class="btn amok-btn">
    AMOK — Verify / Opt Out
  </button>

  <!-- Wallet -->
  <button id="wallet-connect-btn" class="btn wallet-btn">
    Connect Wallet
  </button>

  <script>
    const toggle = document.getElementById('ext-toggle');
    const status = document.getElementById('toggle-status');

    chrome.storage.local.get('extensionEnabled', (data) => {
      const enabled = data.extensionEnabled !== false;
      toggle.checked = enabled;
      applyState(enabled);
    });

    toggle.addEventListener('change', () => {
      const enabled = toggle.checked;
      chrome.storage.local.set({ extensionEnabled: enabled });
      applyState(enabled);
      chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
        if (tabs[0]) chrome.tabs.sendMessage(tabs[0].id, { type: 'TOGGLE', enabled });
      });
    });

    function applyState(enabled) {
      status.textContent = enabled ? 'ACTIVE' : 'DISABLED';
      status.className = 'toggle-status ' + (enabled ? 'on' : 'off');
      document.body.classList.toggle('disabled', !enabled);
    }
  </script>
  <script src="popup.js"></script>
</body>
</html>
